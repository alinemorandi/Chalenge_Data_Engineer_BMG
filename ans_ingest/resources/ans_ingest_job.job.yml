resources:
  jobs:
    ans_ingest_job:
      name: ans_ingest_job
      tasks:
        - task_key: ans_bronze
          email_notifications: {}
          environment_key: Default
          notebook_task:
            notebook_path: ../src/ans_ingest_job/ans_bronze.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: ans_silver
          depends_on:
            - task_key: ans_bronze
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/ans_ingest_job/ans_silver.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: ans_gold
          depends_on:
            - task_key: ans_silver
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/ans_ingest_job/ans_gold.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
      email_notifications:
        no_alert_for_skipped_runs: false
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      queue:
        enabled: true
      timeout_seconds: 0
      webhook_notifications: {}
